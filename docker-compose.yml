# ─── SITI SOVEREIGN v8 — DOCKER COMPOSE ──────────────────────────────────────
# Full stack: MongoDB + SITI backend + persistent warm-start checkpoint
#
# QUICK START:
#   1. Copy .env.example to .env and fill in your API_KEYS and Twilio creds
#   2. docker-compose up -d
#   3. curl -H "X-API-KEY: your-admin-key" http://localhost:8000/api
#
# API KEY FORMAT (in .env):
#   API_KEYS=adminkey123:ADMIN,erpkey456:INTEGRATOR,opskey789:OPERATOR
#
# ROLE PERMISSIONS:
#   ADMIN       → all endpoints
#   OPERATOR    → diversion approvals, read all; cannot delete hubs
#   INTEGRATOR  → v1/intercept + GET state; no topology/decision writes
#   READONLY    → GET only

version: "3.9"

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: siti-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: siti_sovereign
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - siti_net

  # ── SITI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: siti-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      # Warm-start checkpoint persists across container restarts
      # First run: cold fit (may take up to 45s for large datasets)
      # All subsequent restarts: warm load in <100ms
      - checkpoint_data:/app/checkpoints
    environment:
      # ── Required ────────────────────────────────────────────────────────────
      # Format: key:ROLE — roles: ADMIN, OPERATOR, INTEGRATOR, READONLY
      API_KEYS: ${API_KEYS}
      # server.py reads os.environ['MONGO_URL'] and os.environ['DB_NAME'] — must match exactly
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: siti_sovereign

      # ── Warm Start ──────────────────────────────────────────────────────────
      CHECKPOINT_PATH: /app/checkpoints/mimi_kernel_v1.joblib

      # ── WhatsApp Alerts (optional — set to activate) ────────────────────────
      TWILIO_SID:   ${TWILIO_SID:-}
      TWILIO_TOKEN: ${TWILIO_TOKEN:-}
      TWILIO_FROM:  ${TWILIO_FROM:-whatsapp:+14155238886}
      TWILIO_TO:    ${TWILIO_TO:-}
      ALERT_COOLDOWN_MIN: ${ALERT_COOLDOWN_MIN:-30}

      # ── Runtime ─────────────────────────────────────────────────────────────
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # allow time for cold fit on first run
    networks:
      - siti_net

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  checkpoint_data:
    driver: local
    # Warm-start: mimi_kernel_v1.joblib persists here across deploys
    # To force cold refit: docker volume rm siti_sovereign_checkpoint_data

networks:
  siti_net:
    driver: bridge
