# render.yaml — SITI Intelligence Kernel deployment spec
# Deploy: render.com → New Web Service → connect repo → auto-detected

services:
  - type: web
    name: siti-gsc-kernel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: SITI_ADMIN_SECRET
        sync: false
      - key: CASHFREE_CLIENT_ID
        sync: false
      - key: CASHFREE_CLIENT_SECRET
        sync: false
      - key: CASHFREE_WEBHOOK_SECRET
        sync: false
      - key: CASHFREE_WEBHOOK_URL
        sync: false
      - key: CASHFREE_ENV
        value: TEST          # change to PROD when going live
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
